[targets]
# crAPI application base URL (no trailing slash)
crapi_base_url = https://crapi.cropseyit.com

# Mailhog base URL (no trailing slash)
mailhog_base_url = https://mail.cropseyit.com

[settings]
# How many fresh user accounts to create per run
num_users = 6

# How many full traffic cycles to run (each cycle re-uses the same accounts)
iterations = 3

# Seconds to pause between API calls (randomized ±0.3s)
delay_between_requests = 0.5

# Set true only if you have valid certs for the target hosts
verify_ssl = false

# Email domain used when generating fake user emails
email_domain = noname.test

# Log verbosity: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Write a log file alongside the script
log_file = crapi_traffic.log

# Hard timeout (seconds) for every outbound HTTP request.
# Without this, a stalled connection blocks the whole script.
# Raise if your server is slow; lower to fail fast on dead services.
request_timeout = 15
